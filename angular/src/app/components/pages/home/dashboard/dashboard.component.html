<section class="bg-white dark:bg-gray-900">
    <div class="py-8 mx-auto max-w-screen-xl">
        <div class="mx-auto max-w-screen-sm text-center mb-8">
            <h2 class="mb-4 text-4xl font-extrabold text-gray-900 dark:text-white">
                DUMMY JSON
            </h2>
            <p class="font-light text-gray-500 lg:mb-16 sm:text-xl dark:text-gray-400">
                Get dummy/fake JSON data to use as placeholder in development or in prototype testing.
            </p>
        </div>
        <div class="grid gap-3 grid-cols-none md:grid-cols-2">
            <div *ngFor="let product of products"
                class="flex items-center bg-gray-50 rounded-lg shadow dark:bg-gray-800 dark:border-gray-700">
                <div>
                    <img class="object-cover h-48 w-48 rounded-lg" [src]="product.image">
                </div>
                <div class="grow p-3">
                    <h3 class="text-xl font-bold text-gray-900 dark:text-white">
                        {{ product.brand }}
                    </h3>
                    <span class="text-gray-500 dark:text-gray-400">{{ product.category }}</span>
                    <p class="mt-3 mb-4 font-light text-gray-500 dark:text-gray-400">{{ product.description }}</p>
                </div>
            </div>
        </div>
    </div>
</section>
